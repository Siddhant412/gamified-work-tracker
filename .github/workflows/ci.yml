name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Test web critical flows
        run: npm run test:e2e

      - name: Start Supabase
        run: npx supabase start

      - name: Test Supabase migrations, RLS, and RPCs
        run: npm run test:db

      - name: Check generated Supabase types
        run: npm run db:types:check

      - name: Stop Supabase
        if: always()
        run: npx supabase stop --no-backup

      - name: Export web
        run: npx expo export --platform web
