project_id = "gamified-work-tracker"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:8081"
additional_redirect_urls = [
  "http://localhost:8081",
  "http://127.0.0.1:8081",
  "applyloop://",
  "applyloop:///",
  "applyloop:///**",
]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
enable_confirmations = false
